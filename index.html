<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قورئانی پیرۆز لەگەڵ تەفسیر | Modern Quran & Tafsir</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700&family=Reem+Kufi:wght@500;700&family=Noto+Naskh+Arabic:wght@400;700&display=swap');

        :root {
            --bg-gradient: linear-gradient(135deg, #e2e8f0, #cbd5e1);
            --card-bg: rgba(255, 255, 255, 0.8);
            --card-border: rgba(255, 255, 255, 0.5);
            --text-main: #0f172a;
            --text-muted: #475569;
            --primary: #0d9488;
            --primary-light: rgba(13, 148, 136, 0.1);
            --gold: #b45309;
            --shadow: 0 10px 30px 0 rgba(15, 23, 42, 0.05);
            --blur: saturate(180%) blur(20px);
            --dropdown-hover: rgba(13, 148, 136, 0.08);
            --tafsir-color: #2563eb;
        }

        [data-theme="dark"] {
            --bg-gradient: linear-gradient(135deg, #020617, #0f172a);
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #2dd4bf;
            --primary-light: rgba(45, 212, 191, 0.15);
            --gold: #fbbf24;
            --shadow: 0 10px 30px 0 rgba(0, 0, 0, 0.4);
            --dropdown-hover: rgba(45, 212, 191, 0.12);
            --tafsir-color: #60a5fa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        body {
            font-family: 'Plus Jakarta Sans', 'Reem Kufi', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-container {
            width: 100%;
            max-width: 850px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 2rem;
            padding: 1.2rem 1.8rem;
            background: var(--card-bg);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            box-shadow: var(--shadow);
        }

        header h1 {
            font-family: 'Reem Kufi', sans-serif;
            font-size: 1.8rem;
            background: linear-gradient(to left, var(--primary), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .theme-toggle {
            background: none;
            border: none;
            color: var(--primary);
            font-size: 1.3rem;
            cursor: pointer;
            padding: 0.5rem;
        }

        /* دۆپداونی مۆدێرن */
        .custom-dropdown {
            position: relative;
            width: 100%;
            margin-bottom: 2rem;
        }

        .dropdown-select {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--card-border);
            padding: 1.1rem 1.5rem;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: var(--shadow);
            font-weight: 500;
        }

        .dropdown-select i {
            color: var(--primary);
            transition: transform 0.3s ease;
        }

        .custom-dropdown.active .dropdown-select i {
            transform: rotate(180deg);
        }

        .dropdown-menu {
            position: absolute;
            top: calc(100% + 10px);
            left: 0;
            right: 0;
            background: var(--card-bg);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            box-shadow: var(--shadow);
            max-height: 350px;
            overflow-y: auto;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 1rem;
        }

        .custom-dropdown.active .dropdown-menu {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .search-wrapper {
            position: sticky;
            top: 0;
            background: transparent;
            padding-bottom: 0.8rem;
            margin-bottom: 0.5rem;
            border-bottom: 1px solid var(--card-border);
        }

        .search-input {
            width: 100%;
            padding: 0.8rem 1.2rem;
            border-radius: 14px;
            border: 1px solid var(--card-border);
            background: rgba(0,0,0,0.03);
            color: var(--text-main);
            font-family: inherit;
            outline: none;
        }

        .dropdown-options {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 0.5rem;
        }

        .option-item {
            padding: 0.8rem 1rem;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
        }

        .option-item:hover, .option-item.selected {
            background: var(--dropdown-hover);
            color: var(--primary);
            font-weight: bold;
        }

        .option-num {
            font-size: 0.8rem;
            color: var(--text-muted);
            background: rgba(0,0,0,0.04);
            padding: 2px 6px;
            border-radius: 6px;
        }

        /* بەشی پیشاندانی ئایەتەکان و تەفسیر */
        .quran-container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .bismillah-card {
            background: var(--card-bg);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 1.5rem;
            text-align: center;
            font-family: 'Reem Kufi', sans-serif;
            font-size: 2rem;
            color: var(--primary);
            box-shadow: var(--shadow);
        }

        .ayah-block {
            background: var(--card-bg);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            animation: fadeInUp 0.4s ease-out forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .arabic-text {
            font-family: 'Noto Naskh Arabic', serif;
            font-size: 1.75rem;
            line-height: 2.2;
            text-align: right;
            word-spacing: 2px;
        }

        .ayah-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            background: var(--primary-light);
            border: 1px solid var(--gold);
            color: var(--gold);
            border-radius: 50%;
            font-size: 0.85rem;
            font-weight: bold;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin-right: 12px;
        }

        .kurdish-tafsir {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--text-muted);
            text-align: right;
            padding-right: 1rem;
            border-right: 3px solid var(--tafsir-color);
        }

        .loader {
            display: none;
            text-align: center;
            padding: 2rem;
            font-size: 1.2rem;
            color: var(--primary);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.1); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h1>قورئانی پیرۆز</h1>
            <button class="theme-toggle" id="themeBtn"><i class="fas fa-moon"></i></button>
        </header>

        <div class="custom-dropdown" id="quranDropdown">
            <div class="dropdown-select" id="dropdownSelected">
                <span id="selectedLabel">سورەتێک هەڵبژێره...</span>
                <i class="fas fa-chevron-down"></i>
            </div>
            <div class="dropdown-menu">
                <div class="search-wrapper">
                    <input type="text" id="searchBar" class="search-input" placeholder="بۆ ناوی سورەت بگەڕێ...">
                </div>
                <div class="dropdown-options" id="optionsContainer"></div>
            </div>
        </div>

        <div id="loader" class="loader"><i class="fas fa-spinner fa-spin"></i> کەمێک چاوەڕوانبە، دەق و تەفسیر باردەکرێن...</div>

        <div class="quran-container" id="quranContainer"></div>
    </div>

    <script>
        let allSurahs = [];
        const themeBtn = document.getElementById('themeBtn');
        const dropdown = document.getElementById('quranDropdown');
        const dropdownSelected = document.getElementById('dropdownSelected');
        const selectedLabel = document.getElementById('selectedLabel');
        const optionsContainer = document.getElementById('optionsContainer');
        const searchBar = document.getElementById('searchBar');
        const quranContainer = document.getElementById('quranContainer');
        const loader = document.getElementById('loader');

        // دۆخی تاریک و ڕووناک
        themeBtn.addEventListener('click', () => {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            if (isDark) {
                document.documentElement.removeAttribute('data-theme');
                themeBtn.innerHTML = '<i class="fas fa-moon"></i>';
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeBtn.innerHTML = '<i class="fas fa-sun"></i>';
            }
        });

        dropdownSelected.addEventListener('click', () => {
            dropdown.classList.toggle('active');
            if(dropdown.classList.contains('active')) searchBar.focus();
        });

        document.addEventListener('click', (e) => {
            if (!dropdown.contains(e.target)) dropdown.classList.remove('active');
        });

        // لۆدکردنی ناوی سورەتەکان
        async function loadSurahs() {
            try {
                const res = await fetch('https://api.alquran.cloud/v1/surah');
                const data = await res.json();
                allSurahs = data.data;
                renderOptions(allSurahs);
            } catch (err) {
                selectedLabel.textContent = "کێشەیەک لە هێڵدا هەیە";
            }
        }

        function renderOptions(surahs) {
            optionsContainer.innerHTML = '';
            surahs.forEach(s => {
                const item = document.createElement('div');
                item.className = 'option-item';
                item.innerHTML = `<span class="option-num">${s.number}</span> <span>${s.name}</span>`;
                
                item.addEventListener('click', () => {
                    selectedLabel.textContent = s.name;
                    dropdown.classList.remove('active');
                    fetchSurahData(s.number);
                });
                optionsContainer.appendChild(item);
            });
        }

        searchBar.addEventListener('input', (e) => {
            const term = e.target.value.trim();
            const filtered = allSurahs.filter(s => s.name.includes(term) || s.number.toString() === term);
            renderOptions(filtered);
        });

        // هێنانی ئایەت و تەفسیر لە یەک کاتدا (بەکارهێنانی دوو API جیاواز)
        async function fetchSurahData(num) {
            loader.style.display = 'block';
            quranContainer.innerHTML = '';

            try {
                // هێنانی دەقی عەرەبی قورئان
                const resArabic = await fetch(`https://api.alquran.cloud/v1/surah/${num}`);
                const dataArabic = await resArabic.json();
                let ayahsArabic = dataArabic.data.ayahs;

                // هێنانی تەفسیری کوردی (تەفسیری ئاسان - ku.asan)
                const resKurdish = await fetch(`https://api.alquran.cloud/v1/surah/${num}/ku.asan`);
                const dataKurdish = await resKurdish.json();
                let ayahsKurdish = dataKurdish.data.ayahs;

                loader.style.display = 'none';

                // نیشاندانی بسم الله وەک کارتێکی سەربەخۆ ئەگەر سورەتی فاتیحە یان تەوبە نەبوو
                if (num != 1 && num != 9) {
                    const bismillahCard = document.createElement('div');
                    bismillahCard.className = 'bismillah-card';
                    bismillahCard.textContent = 'بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ';
                    quranContainer.appendChild(bismillahCard);

                    // لادانی بسم الله لە ئایەتی یەکەمی دەقە عەرەبییەکە بۆ ئەوەی دووبارە نەبێتەوە
                    if (ayahsArabic[0].text.startsWith("بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ")) {
                        ayahsArabic[0].text = ayahsArabic[0].text.replace("بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ", "").trim();
                    }
                }

                // دروستکردنی بلۆکەکان (ئایەت + تەفسیر پێکەوە)
                ayahsArabic.forEach((ayah, index) => {
                    const ayahBlock = document.createElement('div');
                    ayahBlock.className = 'ayah-block';

                    // هێنانی دەقی کوردی هاوتا
                    const kurdishText = ayahsKurdish[index] ? ayahsKurdish[index].text : 'تەفسیر بەردەست نییە';

                    ayahBlock.innerHTML = `
                        <div class="arabic-text">
                            ${ayah.text} <span class="ayah-badge">${ayah.numberInSurah}</span>
                        </div>
                        <div class="kurdish-tafsir">
                            ${kurdishText}
                        </div>
                    `;
                    quranContainer.appendChild(ayahBlock);
                });

            } catch (err) {
                loader.style.display = 'none';
                alert('هەڵەیەک ڕوویدا لە کاتی هێنانی زانیارییەکان. تکایە هێڵی ئینتەرنێتەکەت بپشکنە.');
                console.error(err);
            }
        }

        loadSurahs();
    </script>
</body>
</html>
